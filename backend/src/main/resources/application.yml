spring:
  application:
    name: iams-backend
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 200
        one-indexed-parameters: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iams}
    username: ${DB_USER:iams_app}
    password: ${DB_PASSWORD:iams_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 10

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

iams:
  security:
    dev-user:
      id: 00000000-0000-0000-0000-0000000000ad
      username: admin
      password: ${IAMS_DEV_ADMIN_PASSWORD:admin123}
      display-name: Dev Administrator
      role: SUPER_ADMIN
    jwt:
      secret: ${IAMS_JWT_SECRET:dev-only-please-change-32-bytes-minimum-secret-value}
      expiration-minutes: 480
  labels:
    sizes:
      - key: "50x25"
        width-mm: 50
        height-mm: 25
      - key: "100x50"
        width-mm: 100
        height-mm: 50
    dpi: 203

logging:
  level:
    com.iams: INFO
