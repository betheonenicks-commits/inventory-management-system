spring:
  application:
    name: iams-backend
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 200
        one-indexed-parameters: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iams}
    username: ${DB_USER:iams_app}
    password: ${DB_PASSWORD:iams_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 10
  mail:
    host: ${IAMS_SMTP_HOST:localhost}
    port: ${IAMS_SMTP_PORT:1025}
  servlet:
    multipart:
      # Kept in step with iams.storage.max-size-bytes - the servlet layer
      # rejects grossly oversized bodies before the service even sees them.
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  error:
    include-message: always

management:
  health:
    mail:
      # An unreachable SMTP server must not mark the whole appliance
      # unhealthy: email failures retry with backoff and in-app notifications
      # are unaffected by design (EPIC-NTF). Without this, the mail starter's
      # auto-registered indicator turns any SMTP outage into a 503 on
      # /actuator/health - found live when the health probe went down the
      # moment the dev SMTP catcher was removed.
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

iams:
  security:
    dev-user:
      id: 00000000-0000-0000-0000-0000000000ad
      username: admin
      password: ${IAMS_DEV_ADMIN_PASSWORD:admin123}
      display-name: Dev Administrator
      role: SUPER_ADMIN
    jwt:
      secret: ${IAMS_JWT_SECRET:dev-only-please-change-32-bytes-minimum-secret-value}
      expiration-minutes: 480
      refresh-expiration-minutes: 43200
      refresh-idle-timeout-minutes: 1440
  labels:
    sizes:
      - key: "50x25"
        width-mm: 50
        height-mm: 25
      - key: "100x50"
        width-mm: 100
        height-mm: 50
    dpi: 203
  lifecycle:
    restore-window-days: 30
    escalation-threshold-hours: 72
  notifications:
    mail-enabled: ${IAMS_MAIL_ENABLED:true}
    mail-from: ${IAMS_MAIL_FROM:iams@localhost}
  storage:
    endpoint: ${IAMS_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:iams-minio-bootstrap}
    secret-key: ${MINIO_ROOT_PASSWORD:iams_dev_minio_password}
    bucket: iams-attachments
    max-size-bytes: 10485760

logging:
  level:
    com.iams: INFO
