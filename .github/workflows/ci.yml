name: CI

# Runs on every push/PR against main - see DEVELOPMENT_LOG.md for the
# "no CI pipeline exists" gap this closes, flagged as pre-existing project-wide
# debt across three prior session entries before being addressed here.
# Backend and frontend are independent jobs (separate toolchains, separate
# failure surfaces) so one failing doesn't hide the other's result.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Maven + Postgres)
    runs-on: ubuntu-latest
    services:
      # Same image/credentials as docker-compose.yml's postgres service, so this
      # mirrors local dev exactly rather than drifting into its own CI-only setup.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: iams
          POSTGRES_USER: iams_app
          POSTGRES_PASSWORD: iams_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iams_app -d iams"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend test suite (Flyway migrations + all unit tests against live Postgres)
        working-directory: backend
        run: mvn -B clean test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: iams
          DB_USER: iams_app
          DB_PASSWORD: iams_dev_password

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 14

  frontend:
    name: Frontend (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (oxlint)
        working-directory: frontend
        run: npm run lint

      - name: Typecheck + production build (tsc -b && vite build)
        working-directory: frontend
        run: npm run build
