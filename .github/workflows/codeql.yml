name: CodeQL

# Static security analysis (SAST) - the "security scan" half of the
# charter's Static Analysis/Quality Gates requirements that CI's own
# mvn test / npm build don't cover (those check correctness, not
# vulnerability patterns like injection, unsafe deserialization, XSS, etc.).
# Scheduled weekly in addition to push/PR so a scan still runs even on a
# quiet week with no commits to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
