services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iams
      POSTGRES_USER: iams_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iams_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - iams_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iams_app -d iams"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-iams-minio-bootstrap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-iams_dev_minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - iams_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  iams_postgres_data:
  iams_minio_data:
