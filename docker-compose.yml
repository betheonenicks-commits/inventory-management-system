# IAMS full stack (US-PLAT-01): `docker compose up -d --build` brings up all
# five services - database, object store, backend, frontend, reverse proxy -
# health-gated so nothing reports "up" before it can actually serve.
# See INSTALL.md for host sizing, configuration, and troubleshooting.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iams
      POSTGRES_USER: iams_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iams_dev_password}
    ports:
      # Host access for dev tools only - containers talk over the internal network
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - iams_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iams_app -d iams"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-iams-minio-bootstrap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-iams_dev_minio_password}
    ports:
      # Loopback-only (US-PLAT-02): network clients must never reach the
      # object store directly - all attachment traffic is brokered through
      # the backend. Host-local access stays available for dev tooling and
      # the MinIO console; full proxy isolation is US-PLAT-15's story.
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - iams_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-iams_dev_password}
      IAMS_JWT_SECRET: ${IAMS_JWT_SECRET:-dev-only-please-change-32-bytes-minimum-secret-value}
      IAMS_DEV_ADMIN_PASSWORD: ${IAMS_DEV_ADMIN_PASSWORD:-admin123}
      IAMS_STORAGE_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-iams-minio-bootstrap}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-iams_dev_minio_password}
    # No host port on purpose - the reverse proxy is the only entry point
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: these alpine images resolve localhost to ::1
      # first, and nginx's `listen 80` binds IPv4 only - localhost checks fail
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/actuator/health/readiness || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 40s
    restart: unless-stopped

  frontend:
    build: ./frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  proxy:
    image: nginx:stable-alpine
    ports:
      - "${IAMS_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  iams_postgres_data:
  iams_minio_data:
