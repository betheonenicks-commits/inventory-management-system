# Single entry point for the whole stack (US-PLAT-01): /api and the OpenAPI
# paths go to the backend, everything else to the frontend's static server.
server {
    listen 80;
    server_name _;

    # Headroom for binary uploads once US-PLAT-02 (object storage) ships
    client_max_body_size 25m;

    # Local liveness answer so the proxy's own health never depends on upstreams
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
