server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Vite emits content-hashed filenames under /assets - safe to cache hard
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached or deploys go stale in users' browsers;
    # unknown paths fall through to it for client-side routing. No `$uri/`
    # fallback: the app's own /assets route would otherwise 301 to the Vite
    # build directory /assets/ instead of rendering the SPA.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
